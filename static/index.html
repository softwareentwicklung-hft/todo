<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
</head>
<body>
<h1>Todo List</h1>
<ul id="todo-list"></ul>
<input id="task" placeholder="Neue Aufgabe" onenter="addTodo()" />
<button onclick="addTodo()">Add</button>
<button onclick="deleteAllTodos()">Delete All</button>

<script>

    // Die Variable input wird dafür verwendet, dass ein Task auch mit Enter hinzugefügt werden kann
    const input = document.getElementById("task");

    input.addEventListener("keydown", function(event) {
        // Wenn der Knopf "Enter" gedrückt wird, dann wird die Methode addTodo() aufgerufen
        if (event.key === "Enter") {
            addTodo();
        }
    });


    // Hier werden die Aufgaben geladen
    async function loadTodos() {
        const res = await fetch('/todos');
        const todos = await res.json();
        // Überprüfe, wie das Aufgaben-JSON, welches vom Backend übergeben wird, aussieht
        console.log(todos);

        const list = document.getElementById('todo-list');
        list.innerHTML = '';
        todos.forEach(todo => {
            const li = document.createElement('li');
            // if Aufgabe == gelöst { Häkchen } else { nichts }
            li.innerText = todo.task + (todo.done ? " ✅" : "");

            // NEU: Knopf zum Löschen einer einzelnen Aufgabe
            const deleteButton = document.createElement('button');
            deleteButton.innerText = 'delete';
            deleteButton.style.marginLeft = '10px';
            // Ruft deleteTodo mit der ID der Aufgabe auf
            deleteButton.onclick = () => deleteTodo(todo.id);

            li.appendChild(deleteButton);
            list.appendChild(li);
        });
    }

    // Hier wird eine Aufgabe hinzugefügt, dies wird mit Hilfe von dem POST-Kommando gemacht
    async function addTodo() {
        const task = document.getElementById('task').value;
        // Hier wird eine Information in der Konsole vom Browser geloggt
        console.log(task);
        // Hier wird der REST-Request erstellt, um eine Aufgabe hinzuzufügen
        await fetch('/todos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task })
        });
        document.getElementById('task').value = '';
        loadTodos();
    }

    // NEU: Lösche eine spezifische Aufgabe
    async function deleteTodo(id) {
        console.log(`Deleting todo with id: ${id}`);
        // Sendet einen DELETE-Request an /todos/{id}
        await fetch(`/todos/${id}`, {
            method: 'DELETE'
        });
        loadTodos(); // Liste neu laden
    }

    // NEU: Lösche alle Aufgaben
    async function deleteAllTodos() {
        if (confirm("Sind Sie sicher, dass Sie ALLE Aufgaben loeschen moechten?")) {
            console.log('Deleting all todos');
            // Sendet einen DELETE-Request an /todos
            await fetch('/todos', {
                method: 'DELETE'
            });
            loadTodos(); // Liste neu laden
        }
    }

    // Füge das Löschen und Updaten von Aufgaben hinzu
    // Zusatzaufgabe: Hinzufügen von Styling mit CSS

    loadTodos();
</script>
</body>
</html>
