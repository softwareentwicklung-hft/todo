<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
</head>
<body>
<!-- Dies ist der Titel der Internetseite -->
<h1>Todo List</h1>
<ul id="todo-list"></ul>
<!-- Hier kann eine neue Aufgabe hinzugefügt werden -->
<input id="task" placeholder="Neue Aufgabe" onenter="addTodo()" />
<!-- Dies ist der Knopf, um neue Aufgaben hinzuzufügen -->
<button onclick="addTodo()">Add</button>

<script>

    // Die Variable input wird dafür verwendet, dass ein Task auch mit Enter hinzugefügt werden kann
    const input = document.getElementById("task");

    input.addEventListener("keydown", function(event) {
        // Wenn der Knopf "Enter" gedrückt wird, dann wird die Methode addTodo() aufgerufen
        if (event.key === "Enter") {
            addTodo();
        }
    });


    // Hier werden die Aufgaben geladen
    async function loadTodos() {
        const res = await fetch('/todos');
        const todos = await res.json();
        // Überprüfe, wie das Aufgaben-JSON, welches vom Backend übergeben wird, aussieht
        // Dies kann im Browser mit den Entwicklungstools in der Konsole überprüft werden
        console.log(todos);
        // Mit Control und Klick auf die verwendeten Methoden kann die Dokumentation angezeigt werden
        const list = document.getElementById('todo-list');
        list.innerHTML = '';
        todos.forEach(todo => {
            const li = document.createElement('li');
            // if Aufgabe == gelöst { Häkchen } else { nichts }
            li.innerText = todo.task + (todo.done ? " ✅" : "");
            list.appendChild(li);
        });
    }

    // Hier wird eine Aufgabe hinzugefügt, dies wird mit Hilfe von dem POST-Kommando gemacht
    async function addTodo() {
        const task = document.getElementById('task').value;
        // Hier wird eine Information in der Konsole vom Browser geloggt
        console.log(task);
        // Hier wird der REST-Request erstellt, um eine Aufgabe hinzuzufügen
        await fetch('/todos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task })
        });
        document.getElementById('task').value = '';
        loadTodos();
    }

    // Füge das Löschen und Updaten von Aufgaben hinzu
    // Zusatzaufgabe: Hinzufügen von Styling mit CSS

    loadTodos();
</script>
</body>
</html>
