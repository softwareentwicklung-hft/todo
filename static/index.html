<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
</head>
<body>
<h1>Todo List</h1>
<ul id="todo-list"></ul>
<input id="task" placeholder="Neue Aufgabe" onenter="addTodo()" />
<button onclick="addTodo()">Add</button>

<script>

    // die Variable input wird dafür verwenden, dass ein Task auch mit Enter hinzugefügt werden kann
    const input = document.getElementById("task");

    input.addEventListener("keydown", function(event) {
        // wenn der Knopf "Enter" gedrückt wird, dann wird die Methode addTodo() aufgerufen
        if (event.key === "Enter") {
            addTodo();
        }
    });


    // hier werden die Aufgaben geladen
    async function loadTodos() {
        const res = await fetch('/todos');
        const todos = await res.json();
        const list = document.getElementById('todo-list');
        list.innerHTML = '';
        todos.forEach(todo => {
            const li = document.createElement('li');
            li.innerText = todo.task + (todo.done ? " ✅" : "");
            list.appendChild(li);
        });
    }

    // hier wird eine Aufgabe hinzugefügt, dies wird mit Hilfe von dem POST kommando gemacht
    async function addTodo() {
        const task = document.getElementById('task').value;
        // hier wird eine Information in der Konsole vom Browser geloggt
        console.log(task);
        await fetch('/todos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task })
        });
        document.getElementById('task').value = '';
        loadTodos();
    }

    // füge das Löschen, Updaten von Aufgaben hinzu
    // Zusatzaufgabe: hinzufügen von Styling mit CSS

    loadTodos();
</script>
</body>
</html>
